name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true

      - name: List bundle files
        shell: bash
        run: ls -la src-tauri/target/release/bundle/nsis/ || echo "nsis dir not found"

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          NSIS_FILE="Sukito_${VERSION}_x64-setup.exe"
          NSIS_SIG=$(cat "src-tauri/target/release/bundle/nsis/${NSIS_FILE}.sig")

          cat > docs/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "https://github.com/VRSoda/Sukito/releases/download/v${VERSION}/${NSIS_FILE}"
              }
            }
          }
          EOF

      - name: Push latest.json to GitHub Pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json
          git commit -m "chore: update latest.json for ${GITHUB_REF#refs/tags/}"
          git push origin HEAD:main
