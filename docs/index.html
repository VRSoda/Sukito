<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 { font-size: 2.5rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .desc { color: #666; font-size: 1rem; max-width: 480px; text-align: center; line-height: 1.7; margin-bottom: 40px; }
        .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        a {
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.8; }
        .primary { background: #1d4ed8; color: #fff; }
        .secondary { background: #1a1a1a; color: #aaa; border: 1px solid #333; }
        footer {
            position: fixed;
            bottom: 24px;
            font-size: 0.8rem;
            color: #333;
        }
        footer a { color: #444; text-decoration: none; }
        footer a:hover { color: #60a5fa; }
    </style>
</head>
<body>
    <h1>Sukito</h1>
    <p class="desc">A desktop calendar widget for Windows that syncs with Google Calendar and adapts to your accent color and the weather outside.</p>
    <div class="links">
        <a href="https://github.com/VRSoda/Sukito/releases" class="primary">Download</a>
        <a href="https://github.com/VRSoda/Sukito" class="secondary">GitHub</a>
        <a href="./privacy.html" class="secondary">Privacy Policy</a>
    </div>
    <footer><a href="./privacy.html">Privacy Policy</a></footer>
</body>
</html>
